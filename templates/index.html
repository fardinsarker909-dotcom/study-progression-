<!DOCTYPE html>
<html>
<head>
    <title>Study Tracker | Library</title>
    <style>
        :root { 
            --accent: #4caf50; 
            --glass: rgba(52, 98, 68, 0.131); 
            --border: rgba(255, 255, 255, 0.1); 
        }
        
        body { background: #0a0a0a; color: #eee; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; padding: 100px 40px 40px; margin: 0; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        
        /* PERSISTENT NAV */
        .nav-bar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { color: #888; text-decoration: none; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: var(--accent); background: rgba(255,255,255,0.05); }
        .nav-item svg { width: 18px; height: 18px; fill: currentColor; }

        /* HIGH-VISIBILITY TYPING BARS */
        input[type="text"], input[type="number"] { 
            padding: 14px 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: rgba(0, 0, 0, 0.4); 
            color: #fff; 
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
        }
        input:focus { 
            outline: none; 
            border-color: var(--accent); 
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05), inset 0 2px 10px rgba(0,0,0,0.7);
        }
        ::placeholder { color: #555; font-style: italic; letter-spacing: 0.5px; }

        button { 
            padding: 14px 25px; 
            border-radius: 12px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 12px; 
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
            z-index: 1;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }

        /* BOSS UI */
        .boss-container { display: flex; justify-content: center; align-items: center; margin-bottom: 60px; position: relative; z-index: 1; }
        .circle-wrapper { position: relative; width: 300px; height: 300px; }
        .circle-svg { width: 100%; height: 100%; transform: rotate(-90deg); filter: drop-shadow(0 0 15px var(--accent)); }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 10; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1.5s ease; }
        .percentage-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .master-percent { font-size: 4.5rem; font-weight: 800; margin: 0; letter-spacing: -2px; color: var(--accent); }
        .boss-title-display { font-size: 0.9rem; color: #8bc9e1; margin-top: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; }
        
        /* GRID & CARDS */
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; position: relative; z-index: 1; }
        .book-card { padding: 25px; position: relative; transition: 0.4s; }
        .book-card h3 { margin: 0;font-family: 'arial'; font-size: 1.4rem; letter-spacing: -0.5px; color: #fff; }
        .bar-bg { background: rgba(0,0,0,0.5); height: 10px; border-radius: 5px; margin-top: 15px; overflow: hidden; border: 1px solid var(--border); }
        .bar-fill { background: var(--accent); height: 100%; width: 0%; transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); box-shadow: 0 0 15px var(--accent); }
        
        /* DROPDOWN & MODAL */
        .dropdown { position: absolute; top: 15px; right: 15px; z-index: 5; }
        .three-dots { cursor: pointer; color: #666; font-size: 22px; padding: 5px; }
        .dropdown-content { display: none; position: absolute; right: 0; background: #111; min-width: 120px; border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .dropdown-content a { color: #eee; padding: 12px; text-decoration: none; display: block; font-size: 13px; }
        .mode-menu { display: none; position: absolute; top: 45px; left: 0; background: #111; border: 1px solid var(--border); border-radius: 12px; min-width: 160px; z-index: 3000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .mode-menu div { padding: 12px; color: #888; cursor: pointer; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .mode-menu div:hover { background: var(--accent); color: #000; }
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 4000; backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-box { background: rgba(30, 30, 30, 0.9); border: 1px solid var(--border); padding: 30px; border-radius: 16px; width: 320px; text-align: center; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav class="nav-bar">
        <a href="/" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> Home</a>
        <a href="/library" class="nav-item"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z"/></svg> Library</a>
        <div class="mode-dropdown" style="position:relative;">
            <div class="nav-item" onclick="toggleModeMenu(event)">
                <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg> Modes
            </div>
            <div id="modeMenu" class="mode-menu">
                <div onclick="setMode('neuron')">🧠 Neuron Mode</div>
                <div onclick="setMode('chill')">❄️ Chill Mode</div>
                <div onclick="setMode('classic')">🟢 Classic Nodes</div>
            </div>
        </div>
    </nav>

    <div id="custom-modal">
        <div class="modal-box">
            <h3 style="margin-top:0;">Delete Subject?</h3>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button onclick="closeModal()" style="background:transparent; color:#888;">Cancel</button>
                <a id="modal-confirm-link" href="#" style="background:#ff5252; color:white; padding:10px 25px; border-radius:10px; text-decoration:none; font-weight:bold;">Delete</a>
            </div>
        </div>
    </div>

    <div class="boss-container">
        <div class="circle-wrapper">
            <svg class="circle-svg" viewBox="0 0 300 300">
                <circle class="circle-bg" cx="150" cy="150" r="130"></circle>
                <circle id="boss-circle" class="circle-progress" cx="150" cy="150" r="130" data-score="{{ master_score }}"></circle>
            </svg>
            <div class="percentage-text">
                <p class="master-percent">{{ master_score }}%</p>
                <div id="boss-label" class="boss-title-display" onclick="toggleBossRename()">{{ boss_title }}</div>
                <form id="boss-form" action="/rename_boss" method="POST" style="display:none; margin-top:10px;">
                    <input type="text" name="new_title" value="{{ boss_title }}" style="width:140px; text-align:center;">
                    <button type="submit" style="padding: 10px 15px; font-size: 10px;">Save</button>
                </form>
            </div>
        </div>
    </div>

    <form action="/add_book" method="POST" style="margin-bottom: 80px; text-align: center;">
        <input type="text" name="title" placeholder="Initialize a new subject path..." required style="width: 400px; max-width: 80%; text-align: center;">
        <button type="submit" style="margin-left: -10px; border-radius: 0 12px 12px 0;">Create Path</button>
    </form>

    <div class="grid">
        {% for book in library %}
        <div class="book-card glass-panel">
            <div id="book-display-{{book.id}}">
                <div class="dropdown">
                    <span class="three-dots" onclick="toggleMenu('m-{{book.id}}')">⋮</span>
                    <div id="m-{{book.id}}" class="dropdown-content">
                        <a href="javascript:void(0)" onclick="showBookEdit('{{book.id}}')">Rename</a>
                        <a href="javascript:void(0)" onclick="openModal('/delete_book/{{book.id}}')" style="color:#ff5252;">Delete</a>
                    </div>
                </div>
                <a href="/book/{{ book.id }}" style="text-decoration:none; color:inherit;">
                    <h3>{{ book.title }}</h3>
                    <p style="color:var(--accent); font-weight:800; font-size: 14px; margin-top:5px;">{{ book.percent }}% SUCCESS</p>
                    <div class="bar-bg"><div class="bar-fill" data-width="{{ book.percent }}"></div></div>
                </a>
            </div>
            <div id="book-edit-{{book.id}}" style="display:none;">
                <form action="/update_book/{{book.id}}" method="POST">
                    <input type="text" name="new_title" value="{{ book.title }}" style="width: 100%; margin-bottom: 10px; box-sizing: border-box;">
                    <div style="display:flex; gap:5px;">
                        <button type="submit" style="flex:1;">Save</button>
                        <button type="button" onclick="hideBookEdit('{{book.id}}')" style="background:none; border:none; color:#888; font-size:11px;">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        const currentMode = localStorage.getItem('studyMode') || 'classic';
        const modeColors = { 'neuron': '#00d2ff', 'chill': '#aebaff', 'classic': '#4caf50' };
        document.documentElement.style.setProperty('--accent', modeColors[currentMode]);

        function toggleModeMenu(e) { e.stopPropagation(); const m = document.getElementById('modeMenu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function setMode(m) { localStorage.setItem('studyMode', m); location.reload(); }
        function openModal(url) { document.getElementById('modal-confirm-link').href = url; document.getElementById('custom-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
        function toggleBossRename() { document.getElementById('boss-label').style.display='none'; document.getElementById('boss-form').style.display='block'; }
        function toggleMenu(id) { event.stopPropagation(); document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.style.display='none'; }); let m = document.getElementById(id); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
        function showBookEdit(id) { document.getElementById('book-display-'+id).style.display='none'; document.getElementById('book-edit-'+id).style.display='block'; }
        function hideBookEdit(id) { document.getElementById('book-display-'+id).style.display='block'; document.getElementById('book-edit-'+id).style.display='none'; }

        // --- 3D PARTICLE ENGINE ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = (currentMode === 'chill') ? Math.random() * 3 + 1 : Math.random() * 2 + 1;
                this.velocity = { x: (Math.random() - 0.5) * 0.8, y: (currentMode === 'chill' ? Math.random() * 1 + 0.5 : (Math.random() - 0.5) * 0.8) };
            }
            draw() {
                ctx.fillStyle = (currentMode === 'neuron') ? '#00d2ff' : (currentMode === 'chill' ? 'rgba(255,255,255,0.4)' : 'rgba(76, 175, 80, 0.4)');
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                this.x += this.velocity.x; this.y += this.velocity.y;
                if (this.y > canvas.height) this.y = 0; if (this.x > canvas.width) this.x = 0;
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < mouse.radius) {
                    const force = (mouse.radius - dist) / mouse.radius;
                    this.x -= (dx / dist) * force * 5; this.y -= (dy / dist) * force * 5;
                }
            }
        }

        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            if(currentMode === 'neuron') {
                for (let a = 0; a < particles.length; a++) {
                    for (let b = a; b < particles.length; b++) {
                        let distance = ((particles[a].x - particles[b].x) ** 2) + ((particles[a].y - particles[b].y) ** 2);
                        if (distance < 15000) {
                            ctx.strokeStyle = `rgba(0, 210, 255, ${1 - distance/15000})`;
                            ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particles[a].x, particles[a].y); ctx.lineTo(particles[b].x, particles[b].y); ctx.stroke();
                        }
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.onload = function() {
            const circle = document.getElementById('boss-circle');
            if(circle) {
                const score = parseFloat(circle.getAttribute('data-score')) || 0;
                const circ = 2 * Math.PI * 130;
                circle.style.strokeDasharray = circ;
                circle.style.strokeDashoffset = circ - (score / 100 * circ);
            }
            document.querySelectorAll('.bar-fill').forEach(bar => { bar.style.width = bar.getAttribute('data-width') + '%'; });
            init(); animate();
        };
        window.onclick = function(e) { 
            if (!e.target.matches('.three-dots')) document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
            if (!e.target.closest('.mode-dropdown')) document.getElementById('modeMenu').style.display = 'none';
        }
    </script>
</body>
</html>
